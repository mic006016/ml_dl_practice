<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      /* Javascript 샘플 코드 */

      var xhr = new XMLHttpRequest()
      var url =
        "http://apis.data.go.kr/1262000/CountryCovid19SafetyServiceNew/getCountrySafetyNewsListNew" /*URL*/
      var queryParams =
        "?" +
        encodeURIComponent("serviceKey") +
        "=" +
        "9ee34d12bf9a5d05e4e4ba1c5ef960c057e6d5985202d3f8c6fb043ebe9f06b9" /*Service Key*/
      queryParams +=
        "&" +
        encodeURIComponent("returnType") +
        "=" +
        encodeURIComponent("JSON") /**/
      queryParams +=
        "&" +
        encodeURIComponent("numOfRows") +
        "=" +
        encodeURIComponent("10") /**/
      queryParams +=
        "&" + encodeURIComponent("pageNo") + "=" + encodeURIComponent("1") /**/
      queryParams +=
        "&" +
        encodeURIComponent("cond[country_nm::EQ]") +
        "=" +
        encodeURIComponent("가나") /**/
      queryParams +=
        "&" +
        encodeURIComponent("cond[country_iso_alp2::EQ]") +
        "=" +
        encodeURIComponent("GH") /**/
      xhr.open("GET", url + queryParams)
      xhr.onreadystatechange = function () {
        if (this.readyState == 4) {
          alert(
            "Status: " +
              this.status +
              "nHeaders: " +
              JSON.stringify(this.getAllResponseHeaders()) +
              "nBody: " +
              this.responseText
          )
        }
      }

      xhr.send("")
    </script>
  </head>
  <body></body>
</html>
