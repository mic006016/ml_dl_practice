<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- axios CDN -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </head>
  <body>
    <button id="b1" style="background: black; color: white">
      일별 박스오피스
    </button>
    <!-- 영화 목록 출력될 부분.. -->
    <div id="result"></div>
    <script>
      b1_tag = document.getElementById("b1")
      // <button id="b1" style="background: black; color: white">일별 박스오피스</button>
      // b1_tag.addEventListener('click', '처리하는 함수')
      // 함수는 따로 만들어서 함수 이름으로 호출할 수 있고,
      // 한번만 쓰는 경우에는 이름없는 함수를 바로 안에다 넣어줄 수 있고.!
      // 이벤트처리하는 경우는 이름없는 함수(익명함수)를 더 많이 씀.
      b1_tag.addEventListener("click", function () {
        //  클릭 이벤트가 발생하면 처리할 내용을 여기에 넣자.
        alert("눌러졌구나.!!!")
        console.log("눌러졌구나.!!!")
        // axios.get(주소, params : {}).then(성공하고 나서 처리할 함수)
        // 아무때나 원할 때 http 통신을 할 수 있는 객체
        // 요청 부분 : axios.get(주소, params : {})
        // 응답받고 나서 처리되는 부분 : .then(성공하고 나서 처리할 함수)
        // then(익명함수) 형태를 많이 씀.

        axios
          .get(
            "http://www.kobis.or.kr/kobisopenapi/webservice/rest/boxoffice/searchDailyBoxOfficeList.json",
            {
              params: {
                key: "1472db1e665d05968f386424d679decd",
                targetDt: "20251124",
              },
            }
          )
          // .then(function (res) {
          .then((res) => {
            console.log("kobis 연결 성공!!!!!")
            console.log(res.data)
            let json = res.data

            let output = "" // 모든 영화 목록 누적용
            // for (시작값; 조건식; 증감식)
            for (let i = 0; i < 10; i++) {
              let movie = json.boxOfficeResult.dailyBoxOfficeList[i]
              // console.log("first >> " + first)
              /*
              console.log(movie.rank)
              console.log(movie.movieNm)
              console.log(movie.openDt)
              console.log(movie.audiAcc)
              console.log(movie.salesAcc)
              console.log("------------------------------")
              */
              rank = movie.rank
              movieNm = movie.movieNm
              openDt = movie.openDt
              audiAcc = movie.audiAcc
              salesAcc = movie.salesAcc

              let one =
                rank +
                " " +
                movieNm +
                " " +
                openDt +
                " " +
                audiAcc +
                " " +
                salesAcc +
                " " +
                "<br>"
              console.log(one)
              console.log("--------------------------------------")
              // result.textContent = 'ok'
              output += one
            } // for
            result.innerHTML = output
          }) // axops
      }) // script
    </script>
  </body>
</html>
